<!-- 1) მოიყვანეთ 3 რეალური მაგალითი სადაც შეიძლება გამოვიყენოთ ტეგები (header, main, footer, section, article, aside) ვებსაიტზე.
მაგალითისთვის გაითვალისწინეთ სხვადასხვა ტიპის საიტები (ბლოგი, ონლაინ მაღაზია, ახალი ამბები და ა.შ.) -->

<!-- საინფორმაციო (ბლოგი)	თითოეული პოსტი არის <article>, ხოლო პოსტების კატეგორიები (მაგ: "ტექნოლოგია", "კულტურა") არის <section>. -->

<!-- ონლაინ მაღაზია	<section> გამოიყენება პროდუქტების კატეგორიებისთვის (მაგ: "ფასდაკლებები"), ხოლო თითოეული პროდუქტის ბარათი არის <article>. -->
<!-- ახალი ამბები	მთავარი ახალი ამბავი არის <article>, ხოლო რუბრიკები (სპორტი, ამინდი) არის <section>. -->

<!-- 2) განმარტეთ თითოეული ტეგის დანიშნულება:

  - <header>

  - <main>

  - <footer>

  - <section>

  - <article>

  - <aside> -->

<!-- <header>: გვერდის ან სექციის ზედა ნაწილი. ჩვეულებრივ შეიცავს ლოგოს, სათაურს და ნავიგაციას.

<main>: გვერდის უნიკალური, ძირითადი შინაარსი. ის მხოლოდ ერთხელ უნდა გამოიყენოთ გვერდზე.

<footer>: გვერდის ან სექციის ქვედა ნაწილი (საავტორო უფლებები, კონტაქტი, სოციალური ბმულები).

<section>: თემატურად დაჯგუფებული კონტენტი. მას, როგორც წესი, აქვს საკუთარი სათაური (<h2>-<h6>).

<article>: დამოუკიდებელი, მთლიანი შინაარსის მქონე ერთეული (მაგ: ბლოგ-პოსტი, კომენტარი, სიახლე).

<aside>: დამატებითი ინფორმაცია, რომელიც ირიბად უკავშირდება მთავარ კონტენტს -->


<!-- 3) შექმენით მარტივი ვებგვერდი, სადაც გამოიყენებთ:

 - header (საიტის სათაური და ნავიგაცია)

 - main (ძირითადი კონტენტი)

 - footer (საკონტაქტო ინფორმაცია)

  მოთხოვნები -> სათაურები, პარაგრაფები, ღილაკები, სურათები. -->


<html>

<head>

    <title>ლაშქრობა საქართველოში</title>
</head>

<body>

    <header>
        <h1 id="main-title">მთის მწვერვალები</h1>
        <nav>
            <a href="#hero-section">მთავარი</a> |
            <a href="#popular-routes">მარშრუტები</a> |
            <a href="#contact-info">კონტაქტი</a>
        </nav>
    </header>

    <main>
        <section id="hero-section">
            <h2>რატომ უნდა ვიმოგზაუროთ მთაში?</h2>
            <p>მთებში ლაშქრობა საუკეთესო გზაა ბუნებასთან დასაახლოებლად.</p>
        </section>

        <section id="popular-routes">
            <h2>პოპულარული მარშრუტები</h2>
            <article>
                <h3>ყაზბეგი - გერგეტი</h3>
                <button>დაჯავშნა</button>
            </article>
        </section>
    </main>

    <footer>
        <div id="contact-info">
            <p>მოგვწერეთ: hiking@georgia.ge</p>
        </div>
    </footer>

</body>

</html>
