<!DOCTYPE html>
<html lang="ka">

<head>
    <meta charset="UTF-8">
    <title>ფორმა</title>
</head>

<body>
    <form>
        <label for="name">სახელი:</label>
        <input type="text" id="name" name="name" required placeholder="სახელი"><br><br>

        <label for="surname">გვარი:</label>
        <input type="text" id="surname" name="surname" required placeholder="გვარი"><br><br>

        <label for="email">მეილი:</label>
        <input type="email" id="email" name="email" required placeholder="mail@example.com"><br><br>

        <label for="pass">პაროლი:</label>
        <input type="password" id="pass" name="pass" required minlength="6" placeholder="პაროლი"><br><br>

        <label for="age">ასაკი:</label>
        <input type="number" id="age" name="age" required min="1" max="120"><br><br>

        <input type="submit" value="გაგზავნა">
    </form>
</body>

</html>
