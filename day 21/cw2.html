<!DOCTYPE html>
<html lang="ka">

<head>

    <title></title>
</head>

<body>
    <h1>მომხმარებლის რეგისტრაცია</h1>
    <form>
        <p>
            <label for="firstName">სახელი:</label><br>
            <input type="text" id="firstName" name="firstName" required placeholder="შეიყვანეთ თქვენი სახელი">

        </p>
        <p>
            <label for="lastName">გვარი:</label><br>
            <input type="text" id="lastName" name="lastName" required placeholder="შეიყვანეთ თქვენი გვარი">

        </p>
        <p>
            <label for="age">ასაკი:</label><br>
            <input type="number" id="age" name="age" required min="1" max="120" placeholder="შეიყვანეთ ასაკი">
        </p>
        <p>
            <label>ძაღლის ჯიში:</label><br>
            <label><input type="radio" name="dogBreed" value="ლაბრადორ რეტრივერი" required> ლაბრადორ
                რეტრივერი</label><br>
            <label><input type="radio" name="dogBreed" value="გერმანული ნაგაზი"> გერმანული ნაგაზი</label><br>
            <label><input type="radio" name="dogBreed" value="ოქროსფერი რეტრივერი"> ოქროსფერი რეტრივერი</label><br>
            <label><input type="radio" name="dogBreed" value="ფრანგული ბულდოგი"> ფრანგული ბულდოგი</label><br>
            <label><input type="radio" name="dogBreed" value="ბიგლი"> ბიგლი</label><br>
            <label><input type="radio" name="dogBreed" value="იორკშირული ტერიერი"> იორკშირული ტერიერი</label>
        </p>
        <p>
            <label for="favoriteMovie">საყვარელი ფილმი:</label><br>
            <select id="favoriteMovie" name="favoriteMovie" required>
                <option value=""> აირჩიეთ ფილმი </option>


                <option value="ფორსტ გამპი">ფორსტ გამპი (Forrest Gump)</option>
                <option value="მატრიცა">მატრიცა (The Matrix)</option>
                <option value="ინტერსტელარი">ინტერსტელარი (Interstellar)</option>
            </select>
        </p>
        <p>
            <button type="submit">რეგისტრაცია</button>
        </p>
    </form>
</body>

</html>
