<!-- 1) რისთვის გვჭირდება style ატრიბუტი -->
<!-- style ატრიბუტი გამოიყენება კონკრეტული HTML ელემენტისთვის Inline CSS სტილის მისანიჭებლად. მისი საშუალებით პირდაპირ HTML ტეგში ვწერთ დიზაინის წესებს -->


<!-- 2) ჩამოთვალეთ და განმარტეთ ნასწავლი property-ები -->

<!-- color: ტექსტის ფერი.

font-size: ტექსტის ზომა .

text-align: ტექსტის ჰორიზონტალური განლაგება (left, center, right).

border: ჩარჩო (შედგება სისქის, სტილისა და ფერისაგან).

background-color: .

width / height: ელემენტის სიგანე და სიმაღლე.

padding: შიდა დაშორება .

margin: გარე დაშორება .

font-family: შრიფტის სტილი . -->

<!-- 3) ახსენით რა არის განსხვავება inline და block ელემენტებს შორის? -->
<!-- Block ელემენტი: იკავებს მთლიან ხაზს (ეკრანის სრულ სიგანეს) და ყოველთვის იწყება ახალი ხაზიდან. მაგალითად: <div>, <h1>, <p>.

Inline ელემენტი: იკავებს მხოლოდ იმდენ ადგილს, რამდენიც მის შიგთავსს სჭირდება და არ იწყება ახალი ხაზიდან. მაგალითად: <span>, <a>, <img>. -->

<!-- 4) შექმენით პარაგრამი, რომელსაც ექნება წითელი ფერი, ტექსტის ზომა 32px. -->

<!-- 5) შექმენით h1 ტექსტი იყოს ლურჯი, ზომაში 50px, იყოს ცენტრში

6) შექმენით p ტექსტი იყოს ნაცრისფერი, ბორდერი ყვითელი, განლაგება მარჯვნივ -->

<p style="color: red; font-size: 32px;">ეს არის წითელი პარაგრაფი</p>

<h1 style="color: blue; font-size: 50px; text-align: center;">მთავარი სათაური</h1>

<p style="color: gray; border: 2px solid yellow; text-align: right;">ნაცრისფერი ტექსტი მარჯვნივ</p>

<!-- 7) ახსენით როდის გამოიყენება div ტეგი? -->
<!-- <div> (division) არის კონტეინერი, რომელიც გამოიყენება სხვადასხვა ელემენტების დასაჯგუფებლად. ის გვეხმარება საიტის სტრუქტურის შექმნაში და ჯგუფურად სტილების მინიჭებაში. -->

<!-- 8) შექმენი დივი რომელიც გასტილე საკუთარი გემოვნებით(ფერი, ბორდერი, ფონტის ზომა). 

   - მის შიგნით შექმენი 6 პარაგრაფი. ამ 6 პარაგრაფიდან ყოველი მეორეს ტექსტი განალაგე მარჯვნივ -->
<div style="background-color: lightblue; border: 3px solid navy; font-size: 18px; padding: 20px;">
    <p>პარაგრაფი 1</p>
    <p style="text-align: right;">პარაგრაფი 2 </p>
    <p>პარაგრაფი 3</p>
    <p style="text-align: right;">პარაგრაფი 4</p>
    <p>პარაგრაფი 5</p>
    <p style="text-align: right;">პარაგრაფი 6 </p>
</div>

<!-- 9) შექმენი დაულაგებელი სია(მიეცი ბორდერი), რომელსაც ექნება 7 ელემენტი:

  - თითოეულ ელემენტს ქონდეს განსხვავებული ფერი

  - გასტილე ელემენტები ისე, რომ ყველაზე ზედა ელემენტს ქონდეს ყველაზე დიდი ფონტის ზომა, ხოლო ყველა შემდეგს 2px-ით ნაკლები წინაზე -->
<ul style="border: 2px solid black; padding: 20px;">
    <li style="color: red; font-size: 30px;"> 1</li>
    <li style="color: blue; font-size: 28px;"> 2</li>
    <li style="color: green; font-size: 26px;"> 3</li>
    <li style="color: orange; font-size: 24px;"> 4</li>
    <li style="color: purple; font-size: 22px;">5</li>
    <li style="color: teal; font-size: 20px;"> 6</li>
    <li style="color: brown; font-size: 18px;"> 7</li>
</ul>

<!-- 10) შექმენი დალაგებული სია(მიეცი ბორდერი), რომელსაც ექნება 7 ელემენტი:

  - თითოეულ ელემენტს ქონდეს განსხვავებული ფერი

  - გასტილე ელემენტები ისე, რომ ყველაზე ზედა ელემენტს ქონდეს ყველაზე პატარა ფონტის ზომა, ხოლო ყველა შემდეგს 2px-ით მეტი წინაზე -->

<ol style="border: 2px dashed green; padding: 20px;">
    <li style="color: pink; font-size: 14px;"> 1</li>
    <li style="color: gray; font-size: 16px;"> 2</li>
    <li style="color: gold; font-size: 18px;"> 3</li>
    <li style="color: cyan; font-size: 20px;"> 4</li>
    <li style="color: magenta; font-size: 22px;"> 5</li>
    <li style="color: lime; font-size: 24px;"> 6</li>
    <li style="color: navy; font-size: 26px;"> 7</li>
</ol>
