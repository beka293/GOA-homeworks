<!DOCTYPE html>
<html>

<head>


    <style>
        div {
            background-color: #f0f4f8;

            color: #333333;

            border: 3px solid #4a90e2;

            font-size: 18px;


            max-width: 500px;
            margin: 20px auto;
        }


        div h2 {
            font-size: 28px;

            color: #2c3e50;

        }

        div h3 {
            font-size: 22px;

            color: #e74c3c;

        }


        div p:first-of-type {
            background-color: #e8f8f5;

            font-size: 16px;


        }

        div p:last-of-type {
            background-color: #fef9e7;

            font-size: 14px;

            padding: 10px;
        }


        div button:first-of-type {
            background-color: #2ecc71;

            color: #ffffff;


            border: none;

        }

        div button:last-of-type {
            background-color: #9b59b6;

            color: #f1c40f;

            border: none;

        }
    </style>
</head>

<body>

    <div>

        <h2>პირველი სათაური</h2>
        <h3>მეორე სათაური</h3>

        <p>ეს არის პირველი პარაგრაფი, განსხვავებული ზომითა და ფონით.</p>
        <p>ეს არის მეორე პარაგრაფი, სრულიად განსხვავებული ვიზუალით.</p>

        <button>პირველი ღილაკი</button>
        <button>მეორე ღილაკი</button>

    </div>

</body>

</html>
