<!-- Long-hand: როდესაც თითოეულ პარამეტრს (ზედა, ქვედა, მარჯვენა, მარცხენა) ცალ-ცალკე ვწერთ.

Short-hand: როდესაც რამდენიმე პარამეტრს ერთ ხაზში ვაერთიანებთ. -->
<!-- CSS-ში Long-hand ნიშნავს თითოეული თვისების ცალ-ცალკე გაწერას, ხოლო Short-hand საშუალებას გვაძლევს რამდენიმე თვისება ერთ ხაზზე მოვაქციოთ.

მაგალითი (Long-hand):
<div style="border-width: 2px; border-style: solid; border-color: red;">ტექსტი</div>

მაგალითი (Short-hand):
<div style="border: 2px solid red;">ტექსტი</div> -->
<!-- <table> ტეგი გამოიყენება ვებ-გვერდზე მონაცემთა ორგანიზებისთვის ცხრილის სახით. -->


<!-- <tr> (Table Row): ქმნის ერთ ჰორიზონტალურ რიგს ცხრილში. ყველა უჯრა უნდა მოექცეს ამ ტეგის შიგნით.

<th> (Table Header): გამოიყენება სათაურის უჯრისთვის. ის მიანიშნებს, თუ რა მონაცემია მოცემულ სვეტში.

<td> (Table Data): ეს არის ჩვეულებრივი უჯრა, სადაც იწერება უშუალოდ მონაცემები. -->

<!-- ბრაუზერი <th>-ში მოთავსებულ ტექსტს ავტომატურად ხდის მუქს და სვამს ცენტრში. <td>-ში კი ტექსტი ჩვეულებრივია და მარცხნივაა გასწორებული. -->

ადაპტურობა: სწორად აწყობილი ცხრილის სტილიზაცია (CSS-ით მორთვა) გაცილებით მარტივია.

მისაწვდომობა (Accessibility): პროგრამები, რომლებიც უსინათლოებს ვებ-გვერდს უკითხავენ, მხოლოდ სწორად სტრუქტურირებულ ცხრილს აღიქვამენ ლოგიკურად. -->
